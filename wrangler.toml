# VTL Evosystem — Shared Platform API Worker
# Platform Interface Specification V1 — binding names are canonical and must not be changed
# Built to evolve

name = "vtl-platform-api"
main = "src/index.ts"
compatibility_date = "2026-02-01"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────
# PRODUCTION (Default)
# ─────────────────────────────────────────────

# ── D1 DATABASE ──
[[d1_databases]]
binding = "DB"
database_name = "vtl-evosystem"
database_id = "a88a5508-3df4-48b9-9af3-b0f676762bc1"

# ── KV NAMESPACES ──
[[kv_namespaces]]
binding = "KV_CATALOG"
id = "5ac4945686334f9f94f9f27940a42872"

[[kv_namespaces]]
binding = "KV_CONFIG"
id = "fc8578e9455840d1a7018d9cb37f4903"

# ── R2 BUCKETS ──
[[r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vtl-media"

[[r2_buckets]]
binding = "R2_DOCS"
bucket_name = "vtl-docs"

# ── ENVIRONMENT VARIABLES ──
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# ─────────────────────────────────────────────
# PREVIEW ENVIRONMENT
# ─────────────────────────────────────────────

[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "vtl-evosystem-preview"
database_id = "e3cb2adc-3049-406f-b369-96d7e61e0219"

[[env.preview.kv_namespaces]]
binding = "KV_CATALOG"
id = "14111b32215d4116abb753285cbb889a"

# NOTE:
# KV_CONFIG intentionally omitted for preview unless config divergence is required.

[[env.preview.r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vtl-media"

[[env.preview.r2_buckets]]
binding = "R2_DOCS"
bucket_name = "vtl-docs"

[env.preview.vars]
ENVIRONMENT = "preview"
API_VERSION = "v1"

# ─────────────────────────────────────────────
# ROUTES & SCHEDULING
# ─────────────────────────────────────────────

[triggers]
crons = []
