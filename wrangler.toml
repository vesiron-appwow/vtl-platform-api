# VTL Evosystem — Shared Platform API Worker
# Platform Interface Specification V1 — binding names are canonical and must not be changed
# Built to evolve

name = "vtl-platform-api"
main = "src/index.ts"
compatibility_date = "2026-02-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 DATABASE ──
# Canonical binding name: DB
[[d1_databases]]
binding = "DB"
database_name = "vtl-evosystem"
database_id = "a88a5508-3df4-48b9-9af3-b0f676762bc1"

# ── KV NAMESPACES ──
# Canonical binding names: KV_CATALOG, KV_CONFIG
[[kv_namespaces]]
binding = "KV_CATALOG"
id = "5ac4945686334f9f94f9f27940a42872"


[[kv_namespaces]]
binding = "KV_CONFIG"
id = "fc8578e9455840d1a7018d9cb37f4903"

# ── R2 BUCKETS ──
# Canonical binding names: R2_MEDIA, R2_DOCS
[[r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vtl-media"

[[r2_buckets]]
binding = "R2_DOCS"
bucket_name = "vtl-docs"

# ── ENVIRONMENT VARIABLES ──
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# ── SECRETS (set via wrangler secret put, never in this file) ──
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# These are referenced in code as env.STRIPE_SECRET_KEY and env.STRIPE_WEBHOOK_SECRET

# ── ROUTES ──
# All API traffic routed through this worker
[triggers]
crons = []

# ── RATE LIMITING ──
# Applied per route in middleware layer
